[AttackGraph - DDoS Detection]
search = index=network sourcetype=firewall \
         | stats count as pkt_count, values(src_ip) as src_ips by dest_ip, _time \
         | where pkt_count > 5000 \
         | eval attack_type="ddos"
cron_schedule  = */5 * * * *
alert.condition = search count > 0
alert.severity  = critical
action.attackgraph_memory = 1
action.attackgraph_memory.param.attack_type = ddos
action.attackgraph_memory.param.severity    = critical

[AttackGraph - Cloud Identity Anomaly]
search = index=cloud sourcetype=o365:management:activity OR sourcetype=aws:cloudtrail \
         | eval failed = if(match(Operation,"Failed") OR errorCode!="",1,0) \
         | stats sum(failed) as fail_count, dc(src_ip) as ip_count by UserId, _time \
         | where fail_count > 10 OR ip_count > 3
cron_schedule  = */5 * * * *
alert.condition = search count > 0
alert.severity  = high
action.attackgraph_memory = 1
action.attackgraph_memory.param.attack_type = cloud_identity
action.attackgraph_memory.param.severity    = high

[AttackGraph - Brute Force Credential]
search = index=auth sourcetype=WinEventLog:Security EventCode=4625 \
         | stats count as fail_count, values(src_ip) as src_ips by user, dest \
         | where fail_count > 20
cron_schedule  = */5 * * * *
alert.condition = search count > 0
alert.severity  = high
action.attackgraph_memory = 1
action.attackgraph_memory.param.attack_type = brute_force
action.attackgraph_memory.param.severity    = high

[AttackGraph - Malware Ransomware]
search = index=endpoint sourcetype=sysmon \
         (EventCode=1 AND (CommandLine="*powershell*-enc*" OR CommandLine="*certutil*")) \
         OR (EventCode=11 AND TargetFilename="*.locked" OR TargetFilename="*.encrypted") \
         | eval attack_type="malware_ransomware"
cron_schedule  = */2 * * * *
alert.condition = search count > 0
alert.severity  = critical
action.attackgraph_memory = 1
action.attackgraph_memory.param.attack_type = malware_ransomware
action.attackgraph_memory.param.severity    = critical

[AttackGraph - Lateral Movement]
search = index=endpoint sourcetype=WinEventLog:Security \
         (EventCode=4624 LogonType=3) \
         | stats dc(dest) as hop_count, values(dest) as hosts by user, src \
         | where hop_count > 3
cron_schedule  = */5 * * * *
alert.condition = search count > 0
alert.severity  = high
action.attackgraph_memory = 1
action.attackgraph_memory.param.attack_type = lateral_movement
action.attackgraph_memory.param.severity    = high
