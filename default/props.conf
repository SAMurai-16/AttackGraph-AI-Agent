[attackgraph:verdict]
SHOULD_LINEMERGE = false
TRUNCATE = 0
# Dashboards extract JSON explicitly via `| spath`. Disable search-time auto JSON
# extraction so multivalue fields (techniques, attack_path, ...) are not parsed
# twice, which would double every value and render as duplicate table rows.
KV_MODE = none
description = AttackGraph AI investigation verdicts (agent write-back)

