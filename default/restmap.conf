[script:neo4j_execute_cypher]
match = /neo4j_execute_cypher
script = neo4j_mcp_handler.py
scripttype = persist
handler = neo4j_mcp_handler.Neo4jExecuteCypherHandler
requireAuthentication = true
output_modes = json
passPayload = true

[script:neo4j_get_schema]
match = /neo4j_get_schema
script = neo4j_mcp_handler.py
scripttype = persist
handler = neo4j_mcp_handler.Neo4jGetSchemaHandler
requireAuthentication = true
output_modes = json
