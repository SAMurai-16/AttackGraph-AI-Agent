[restmap:neo4j_execute_cypher]
description = "Executes a Cypher query against the Neo4j database to retrieve or create graph data. Returns JSON output."
endpoint_name = neo4j_execute_cypher
method = post
headers = "Accept:application/json"
tags = "neo4j, cypher, graph, database"

[restmap:neo4j_get_schema]
description = "Retrieves the current schema (node labels and relationship types) of the Neo4j graph."
endpoint_name = neo4j_get_schema
method = get
headers = "Accept:application/json"
tags = "neo4j, schema, graph, database"
